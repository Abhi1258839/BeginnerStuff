<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | LinkedIn</title>
    <style>
        :root {
            --bg: #eef3f8;
            --card: #ffffff;
            --primary: #0a66c2;
            --muted: #5f6f84;
            --border: #dce6f1;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef3f8 0%, #f8fafc 100%);
            color: #1c2433;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .page-shell {
            width: min(540px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .hero {
            padding: 36px 32px;
        }
        .hero h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--primary);
        }
        .hero p {
            margin: 16px 0 0;
            color: var(--muted);
            line-height: 1.75;
        }
        .details {
            padding: 0 32px 32px;
        }
        .detail-row {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }
        .detail-box {
            padding: 20px;
            border-radius: 18px;
            background: #f4f8ff;
            border: 1px solid #dbe8ff;
        }
        .detail-box strong {
            display: block;
            margin-bottom: 10px;
            color: #111827;
        }
        .detail-box p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }
        .logout-link {
            display: inline-flex;
            margin-top: 24px;
            padding: 14px 22px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <section class="hero">
            <h1>Welcome, {{ full_name }}!</h1>
            <p>You are now signed in to the LinkedIn-style app. Build your profile, connect with people, and explore your professional network.</p>
        </section>
        <section class="details">
            <div class="detail-row">
                <div class="detail-box">
                    <strong>Email</strong>
                    <p>{{ email }}</p>
                </div>
                <div class="detail-box">
                    <strong>Company</strong>
                    <p>{{ company }}</p>
                </div>
            </div>
            <a class="logout-link" href="/logout">Sign out</a>
        </section>
    </div>
</body>
</html>
