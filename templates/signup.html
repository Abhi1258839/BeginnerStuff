<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Signup</title>
    <style>
        :root {
            --bg: #f3f2ef;
            --card: #ffffff;
            --text: #0a66c2;
            --muted: #444d56;
            --border: #dce6f1;
            --button: #0a66c2;
            --button-hover: #004182;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, rgba(10, 102, 194, 0.14), transparent 20%),
                        linear-gradient(180deg, #f6f7f9 0%, #eef1f5 100%);
            color: #1c1e21;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .page-shell {
            width: min(520px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .hero {
            background: linear-gradient(135deg, #0a66c2 0%, #004182 100%);
            color: white;
            padding: 32px 28px;
        }
        .hero h1 {
            margin: 0;
            font-size: 2.3rem;
            letter-spacing: -0.04em;
        }
        .hero p {
            margin: 16px 0 0;
            line-height: 1.7;
            color: rgba(255,255,255,0.92);
        }
        .form-panel {
            padding: 32px 28px 36px;
        }
        .form-panel h2 {
            margin: 0 0 20px;
            color: var(--text);
            font-size: 1.35rem;
        }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--muted);
        }
        .field input,
        .field select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #f8fafc;
            font-size: 1rem;
            color: #111827;
        }
        .field input:focus,
        .field select:focus {
            outline: 2px solid rgba(10,102,194,0.24);
            border-color: #0a66c2;
        }
        .radio-group {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .form-button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            background: var(--button);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .form-button:hover {
            background: var(--button-hover);
        }
        .small-note {
            margin-top: 20px;
            font-size: 0.95rem;
            color: var(--muted);
        }
        .small-note a {
            color: var(--button);
            text-decoration: none;
            font-weight: 700;
        }
        .error-box {
            margin-bottom: 20px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #ffe8e8;
            color: #842029;
            border: 1px solid #f5c2c7;
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <section class="hero">
            <h1>LinkedIn</h1>
            <p>Create your account to join a professional network that connects employers, peers, and opportunities.</p>
        </section>
        <section class="form-panel">
            <h2>Sign up for LinkedIn</h2>
            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}
            <form method="post" action="/signup">
                <div class="field">
                    <label for="full_name">Full name</label>
                    <input id="full_name" name="full_name" type="text" placeholder="Enter your full name" value="{{ full_name|default('') }}" required>
                </div>
                <div class="field">
                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email" placeholder="name@example.com" value="{{ email|default('') }}" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Create a password" required>
                </div>
                <div class="field">
                    <label>Are you employed?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="employed" value="yes" {% if employed != 'no' %}checked{% endif %}> Yes</label>
                        <label><input type="radio" name="employed" value="no" {% if employed == 'no' %}checked{% endif %}> No</label>
                    </div>
                </div>
                <div class="field">
                    <label for="company">Company</label>
                    <input id="company" name="company" type="text" placeholder="Enter your company or employer" value="{{ company|default('') }}">
                </div>
                <button type="submit" class="form-button">Create account</button>
            </form>
            <p class="small-note">Already have an account? <a href="/">Sign in</a></p>
        </section>
    </div>
    <script>
        const radios = document.querySelectorAll('input[name="employed"]');
        const companyInput = document.getElementById('company');
        function updateCompanyInput() {
            const employedValue = document.querySelector('input[name="employed"]:checked').value;
            if (employedValue === 'no') {
                companyInput.placeholder = 'Enter "Unemployed" or leave blank';
            } else {
                companyInput.placeholder = 'Enter your company or employer';
            }
        }
        radios.forEach(radio => radio.addEventListener('change', updateCompanyInput));
        updateCompanyInput();
    </script>
</body>
</html>
